<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angel Ruiz | Magia & Ilusionismo</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23991b1b'%3E%3Cpath d='M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z'/%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #020617;
            color: #e2e8f0;
            cursor: none;
        }
        @media (max-width: 768px) {
            body { cursor: auto; }
        }
        ::selection {
            background-color: rgba(245, 158, 11, 0.3);
            color: #fde68a;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .animate-spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(245, 158, 11, 0.3); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(245, 158, 11, 0.5); }
        video { object-fit: cover; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, useScroll, useTransform, useSpring, useMotionValue, useVelocity, useAnimationFrame, AnimatePresence } = window.Motion;

        // ICONOS
        const Sparkles = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M9 5H5"/><path d="M19 17v4"/><path d="M21 19h-4"/></svg>);
        const GlassWater = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M15.2 22a3 3 0 0 0 3-3V5H5.8v14a3 3 0 0 0 3 3h6.4Z"/><path d="M6 8h12"/></svg>);
        const Heart = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>);
        const Users = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>);
        const ArrowRight = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>);
        const Star = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>);
        const Quote = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/></svg>);
        const X = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M18 6 6 18"/><path d="M6 6 18 18"/></svg>);
        const CheckCircle2 = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>);
        const Calendar = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>);
        const Mail = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>);
        const Phone = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>);
        const MessageSquare = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>);
        const User = (props) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>);

        const wrap = (min, max, v) => {
            const rangeSize = max - min;
            return ((((v - min) % rangeSize) + rangeSize) % rangeSize) + min;
        };

        const MagicCursor = () => {
            const [mousePosition, setMousePosition] = useState({ x: 0, y: 0 });
            const [isHovering, setIsHovering] = useState(false);
            useEffect(() => {
                const updateMousePosition = (e) => setMousePosition({ x: e.clientX, y: e.clientY });
                const handleMouseOver = (e) => setIsHovering(e.target.closest('button, a, input, textarea, select, .cursor-pointer') !== null);
                window.addEventListener('mousemove', updateMousePosition);
                window.addEventListener('mouseover', handleMouseOver);
                return () => {
                    window.removeEventListener('mousemove', updateMousePosition);
                    window.removeEventListener('mouseover', handleMouseOver);
                };
            }, []);
            return (
                <motion.div className="fixed top-0 left-0 pointer-events-none z-[99999] mix-blend-screen hidden md:block"
                    animate={{ x: mousePosition.x - (isHovering ? 32 : 16), y: mousePosition.y - (isHovering ? 32 : 16), scale: isHovering ? 1.5 : 1 }}
                    transition={{ x: { duration: 0 }, y: { duration: 0 }, scale: { type: 'spring', stiffness: 500, damping: 28 } }}>
                    <div className={`rounded-full bg-amber-400 blur-xl opacity-40 transition-all duration-300 ${isHovering ? 'w-16 h-16' : 'w-8 h-8'}`} />
                    <div className={`absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 rounded-full border border-amber-200/50 transition-all duration-300 ${isHovering ? 'w-12 h-12' : 'w-4 h-4'}`} />
                </motion.div>
            );
        };

        const ParticleBackground = () => {
            const particles = Array.from({ length: 20 }).map((_, i) => ({ id: i, x: Math.random() * 100, y: Math.random() * 100, size: Math.random() * 3 + 1, duration: Math.random() * 10 + 10 }));
            return (
                <div className="fixed inset-0 z-0 pointer-events-none overflow-hidden">
                    {particles.map((p) => (
                        <motion.div key={p.id} className="absolute rounded-full bg-amber-500/20 blur-sm" style={{ left: `${p.x}%`, top: `${p.y}%`, width: p.size, height: p.size }} animate={{ y: [0, -100, 0], opacity: [0, 0.5, 0] }} transition={{ duration: p.duration, repeat: Infinity, ease: "linear" }} />
                    ))}
                    <div className="absolute inset-0 bg-gradient-to-b from-slate-950 via-slate-900/90 to-slate-950 z-0" />
                </div>
            );
        };

        const MagicModal = ({ isOpen, onClose, children }) => {
            useEffect(() => { document.body.style.overflow = isOpen ? 'hidden' : 'unset'; return () => { document.body.style.overflow = 'unset'; }; }, [isOpen]);
            return ReactDOM.createPortal(
                <AnimatePresence>
                    {isOpen && (
                        <>
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} onClick={onClose} className="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-[9998] flex items-center justify-center cursor-pointer" />
                            <div className="fixed inset-0 z-[9999] flex items-center justify-center pointer-events-none p-4">
                                <motion.div initial={{ opacity: 0, scale: 0.9, y: 30, rotateX: 10 }} animate={{ opacity: 1, scale: 1, y: 0, rotateX: 0 }} exit={{ opacity: 0, scale: 0.9, y: 30, rotateX: -10 }} transition={{ type: "spring", duration: 0.6, bounce: 0.3 }} className="bg-slate-900/95 border border-amber-500/30 w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden pointer-events-auto relative flex flex-col max-h-[85vh]">
                                    <button onClick={onClose} className="absolute top-3 right-3 text-slate-400 hover:text-amber-400 transition-colors z-10 bg-slate-900/80 rounded-full w-10 h-10 flex items-center justify-center hover:bg-slate-800 border border-transparent hover:border-amber-500/30 cursor-pointer"><X className="w-5 h-5" /></button>
                                    <div className="overflow-y-auto custom-scrollbar h-full">{children}</div>
                                    <div className="absolute inset-0 border border-amber-500/20 rounded-2xl pointer-events-none" />
                                    <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-amber-500 to-transparent opacity-50" />
                                </motion.div>
                            </div>
                        </>
                    )}
                </AnimatePresence>, document.body
            );
        };

        const MagicChat = () => {
            const [isOpen, setIsOpen] = useState(false);
            const [messages, setMessages] = useState([
                { role: 'assistant', text: '¡Hola! Soy el asistente de Ángel Ruiz. ¿En qué puedo ayudarle hoy?' }
            ]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const scrollRef = useRef(null);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }, [messages]);

            const sendMessage = async () => {
                if (!input.trim() || isLoading) return;

                const userMsg = input;
                setMessages(prev => [...prev, { role: 'user', text: userMsg }]);
                setInput('');
                setIsLoading(true);

                const API_KEY = "AIzaSyD0JmT0UUGRgGs182HsPPIlqAfDxAATZTU"; 
                const baseUrl = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent";
                const url = baseUrl + "?key=" + API_KEY;

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{ text: `Actúa como el Asistente Ejecutivo de Ángel Ruiz, ilusionista profesional con 12 años de experiencia. Estilo corporativo y sofisticado. Trata de Usted. Info: Especialista en magia de cerca y eventos VIP. No hace fiestas infantiles. Invita a pulsar "Reservar Experiencia" para disponibilidad. Pregunta: ${userMsg}` }]
                            }]
                        })
                    });

                    if (!response.ok) throw new Error('Error API');

                    const data = await response.json();
                    if (data.candidates && data.candidates[0].content.parts[0].text) {
                        const aiText = data.candidates[0].content.parts[0].text;
                        setMessages(prev => [...prev, { role: 'assistant', text: aiText }]);
                    }
                } catch (e) {
                    setMessages(prev => [...prev, { role: 'assistant', text: 'Mis disculpas, la conexión con el oráculo se ha interrumpido.' }]);
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="fixed bottom-6 right-6 z-[100] font-['Inter']">
                    <AnimatePresence>
                        {isOpen && (
                            <motion.div initial={{ opacity: 0, scale: 0.8, y: 20 }} animate={{ opacity: 1, scale: 1, y: 0 }} exit={{ opacity: 0, scale: 0.8, y: 20 }} className="bg-slate-900/95 border border-amber-500/30 w-[320px] h-[450px] mb-4 rounded-2xl shadow-2xl flex flex-col overflow-hidden backdrop-blur-xl pointer-events-auto">
                                <div className="p-4 border-b border-white/10 bg-amber-500/10 flex justify-between items-center">
                                    <div className="flex items-center gap-2"><div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"/><span className="text-amber-400 font-['Cinzel'] font-bold text-xs tracking-widest">Oráculo de Ángel</span></div>
                                    <button onClick={() => setIsOpen(false)} className="text-slate-400 hover:text-white cursor-pointer"><X className="w-4 h-4"/></button>
                                </div>
                                <div ref={scrollRef} className="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
                                    {messages.map((m, i) => (
                                        <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-[85%] p-3 rounded-2xl text-[13px] leading-relaxed ${m.role === 'user' ? 'bg-amber-600 text-slate-950 rounded-tr-none' : 'bg-slate-800/80 text-slate-200 rounded-tl-none border border-white/5'}`}>{m.text}</div>
                                        </div>
                                    ))}
                                    {isLoading && <div className="text-amber-500/50 text-[10px] italic animate-pulse">Consultando el más allá...</div>}
                                </div>
                                <div className="p-4 border-t border-white/10 flex gap-2 bg-slate-900/50">
                                    <input type="text" value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && sendMessage()} placeholder="Escriba aquí..." className="flex-1 bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-amber-500/50 text-white"/>
                                    <button onClick={sendMessage} className="bg-amber-500 p-2 rounded-lg text-slate-950 hover:bg-amber-400 cursor-pointer"><ArrowRight className="w-4 h-4"/></button>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                    <motion.button whileHover={{ scale: 1.1 }} whileTap={{ scale: 0.9 }} onClick={() => setIsOpen(!isOpen)} className="w-14 h-14 bg-amber-500 rounded-full shadow-lg flex items-center justify-center text-slate-950 cursor-pointer relative">
                        {isOpen ? <X className="w-6 h-6" /> : <MessageSquare className="w-6 h-6" />}
                        <div className="absolute inset-0 rounded-full bg-amber-400 animate-ping opacity-20" />
                    </motion.button>
                </div>
            );
        };

        const ContactFormModal = ({ isOpen, onClose }) => {
            const [status, setStatus] = useState("idle");
            const today = new Date().toISOString().split('T')[0];
            const FORMSPREE_ENDPOINT = "https://formspree.io/f/xeoydngl"; 

            const handlePhoneInput = (e) => {
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
                if (e.target.value.length > 9) e.target.value = e.target.value.slice(0, 9);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setStatus("submitting");
                const form = e.target;
                const data = new FormData(form);
                data.append("_subject", `Reserva: ${data.get('eventType')} - ${data.get('name')} (${data.get('date')})`);

                try {
                    const response = await fetch(FORMSPREE_ENDPOINT, { method: 'POST', body: data, headers: { 'Accept': 'application/json' } });
                    if (response.ok) { setStatus("success"); form.reset(); setTimeout(() => { onClose(); setStatus("idle"); }, 3000); }
                    else { setStatus("error"); }
                } catch (error) { setStatus("error"); }
            };

            if (status === "success") {
                return (
                    <MagicModal isOpen={isOpen} onClose={onClose}>
                        <div className="p-8 md:p-16 flex flex-col items-center justify-center text-center h-full min-h-[400px]">
                            <motion.div initial={{ scale: 0 }} animate={{ scale: 1 }} className="w-20 h-20 rounded-full bg-green-500/20 flex items-center justify-center mb-6 border border-green-500/50"><CheckCircle2 className="w-10 h-10 text-green-400" /></motion.div>
                            <h3 className="text-2xl font-['Cinzel'] text-white mb-2">¡Mensaje Enviado!</h3>
                            <p className="text-slate-300">Gracias por contactar. La magia está en camino.</p>
                        </div>
                    </MagicModal>
                );
            }

            return (
                <MagicModal isOpen={isOpen} onClose={onClose}>
                    <div className="p-6 md:p-10">
                        <div className="text-center mb-6 md:mb-8"><h3 className="text-2xl font-['Cinzel'] text-white mb-2">Reserva tu Fecha</h3><p className="text-slate-400 text-xs font-light">Cuéntame sobre tu evento y creemos algo inolvidable.</p></div>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="space-y-1"><label className="text-xs uppercase tracking-widest text-amber-500 ml-1">Nombre</label><div className="relative"><User className="absolute left-3 top-3.5 w-4 h-4 text-slate-500" /><input required name="name" type="text" placeholder="Tu nombre" className="w-full bg-slate-950/50 border border-slate-700 rounded-lg py-3 pl-10 pr-4 text-slate-200 focus:border-amber-500/50 text-sm" /></div></div>
                                <div className="space-y-1"><label className="text-xs uppercase tracking-widest text-amber-500 ml-1">Teléfono</label><div className="relative"><Phone className="absolute left-3 top-3.5 w-4 h-4 text-slate-500" /><input required name="phone" type="tel" placeholder="600123456" onInput={handlePhoneInput} minLength="9" maxLength="9" className="w-full bg-slate-950/50 border border-slate-700 rounded-lg py-3 pl-10 pr-4 text-slate-200 text-sm" /></div></div>
                            </div>
                            <div className="space-y-1"><label className="text-xs uppercase tracking-widest text-amber-500 ml-1">Email</label><div className="relative"><Mail className="absolute left-3 top-3.5 w-4 h-4 text-slate-500" /><input required name="email" type="email" placeholder="tu@email.com" className="w-full bg-slate-950/50 border border-slate-700 rounded-lg py-3 pl-10 pr-4 text-slate-200 text-sm" /></div></div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="space-y-1"><label className="text-xs uppercase tracking-widest text-amber-500 ml-1">Tipo de Evento</label><select name="eventType" className="w-full bg-slate-950/50 border border-slate-700 rounded-lg py-3 px-4 text-slate-200 appearance-none cursor-pointer text-sm"><option>Boda</option><option>Evento de Empresa</option><option>Fiesta Privada</option><option>Comunión</option><option>Otro</option></select></div>
                                <div className="space-y-1"><label className="text-xs uppercase tracking-widest text-amber-500 ml-1">Fecha Estimada</label><input name="date" type="date" min={today} className="w-full bg-slate-950/50 border border-slate-700 rounded-lg py-3 px-4 text-slate-200 [color-scheme:dark] text-sm" /></div>
                            </div>
                            <div className="space-y-1"><label className="text-xs uppercase tracking-widest text-amber-500 ml-1">Mensaje</label><textarea required name="message" rows="4" placeholder="Detalles..." className="w-full bg-slate-950/50 border border-slate-700 rounded-lg py-3 pl-10 text-slate-200 resize-none text-sm"></textarea></div>
                            <button type="submit" disabled={status === "submitting"} className="w-full bg-gradient-to-r from-amber-600 to-amber-500 text-slate-950 font-bold py-3 rounded-lg transition-all uppercase text-xs">
                                {status === "submitting" ? "Enviando..." : "Enviar Solicitud"}
                            </button>
                        </form>
                    </div>
                </MagicModal>
            );
        };

        const Hero = ({ onOpenModal }) => {
            const { scrollY } = useScroll();
            const y1 = useTransform(scrollY, [0, 500], [0, 200]);
            const opacity = useTransform(scrollY, [0, 300], [1, 0]);
            return (
                <section className="relative h-screen flex items-center justify-center overflow-hidden z-10">
                    <div className="absolute inset-0 z-0 overflow-hidden"><video autoPlay loop muted playsInline className="w-full h-full object-cover"><source src="spring.mp4" type="video/mp4" /><div className="w-full h-full bg-slate-950"></div></video><div className="absolute inset-0 bg-slate-950/70" /></div>
                    <motion.div style={{ y: y1, opacity }} className="text-center px-4 relative z-10 flex flex-col items-center w-full">
                        <h1 className="font-['Cinzel'] text-5xl md:text-8xl font-bold mb-8 tracking-wider text-white">ANGEL <span className="text-amber-400">RUIZ</span></h1>
                        <h2 className="text-lg md:text-2xl text-slate-200 border-y border-amber-500/30 py-4 px-8 uppercase tracking-widest">Ilusionista Profesional</h2>
                        <motion.button onClick={onOpenModal} whileHover={{ scale: 1.05 }} className="mt-10 px-8 py-4 bg-amber-500 text-slate-950 font-bold rounded-full uppercase text-xs cursor-pointer shadow-lg shadow-amber-500/20">Reservar Experiencia</motion.button>
                    </motion.div>
                </section>
            );
        };

        const TrustedBrands = () => {
            const brands = [
                { name: "Movistar Estudiantes", logo: "images/logo-movistar.png" },
                { name: "Peña La Escombrera", logo: "images/logo-escombrera.png" },
                { name: "Colegio Gondomar", logo: "images/logo-gondomar.png" },
                { name: "Catering Senescal", logo: "images/logo-senescal.png" },
                { name: "Alcampo", logo: "images/logo-alcampo.png" },
                { name: "Ahorramás", logo: "images/logo-ahorramas.png" }
            ];
            return (
                <section className="py-12 bg-slate-950/80 border-y border-white/5 relative z-10">
                    <div className="max-w-7xl mx-auto px-6">
                        <p className="text-center text-xs font-bold tracking-widest text-amber-500 uppercase mb-8">Empresas Colaboradoras</p>
                        <div className="flex flex-wrap justify-center items-center gap-12">
                            {brands.map((b, i) => (<img key={i} src={b.logo} alt={b.name} className="h-8 md:h-12 grayscale opacity-50 hover:grayscale-0 hover:opacity-100 transition-all cursor-pointer"/>))}
                        </div>
                    </div>
                </section>
            );
        };

        const Services = () => {
            const [selectedService, setSelectedService] = useState(null);
            const servicesData = [
                { id: 1, title: "Bodas Mágicas", shortDesc: "Magia itinerante durante el cóctel.", fullDesc: "Cree un ambiente inolvidable rompiendo el hielo entre invitados.", details: ["Magia de cerca", "Show para novios"], icon: Heart, bgClass: "from-pink-500/20 to-purple-500/20" },
                { id: 2, title: "Eventos Privados", shortDesc: "Magia de salón exclusiva.", fullDesc: "Ilusionismo sofisticado para cenas y fiestas privadas.", details: ["Close-up", "Mentalismo"], icon: Users, bgClass: "from-amber-500/20 to-orange-500/20" },
                { id: 3, title: "Corporativos", shortDesc: "Refuerzo de marca mediante el asombro.", fullDesc: "Ideal para cenas de empresa y presentaciones.", details: ["Efectos personalizados", "Dinamización"], icon: GlassWater, bgClass: "from-blue-500/20 to-indigo-500/20" }
            ];
            return (
                <section id="services" className="py-20 px-4 max-w-7xl mx-auto relative z-10">
                    <div className="text-center mb-12"><h3 className="text-3xl md:text-5xl font-['Cinzel'] text-white">Servicios</h3></div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                        {servicesData.map((s, i) => (
                            <div key={i} onClick={() => setSelectedService(s)} className="bg-slate-900/40 border border-slate-800 p-8 rounded-xl cursor-pointer hover:border-amber-500/30 transition-all">
                                <s.icon className="w-8 h-8 text-amber-400 mb-6" />
                                <h3 className="text-2xl font-['Cinzel'] text-white mb-4">{s.title}</h3>
                                <p className="text-slate-400 text-sm">{s.shortDesc}</p>
                            </div>
                        ))}
                    </div>
                    <MagicModal isOpen={!!selectedService} onClose={() => setSelectedService(null)}>
                        {selectedService && (
                            <div className="p-8"><h3 className="text-3xl font-['Cinzel'] text-white mb-4">{selectedService.title}</h3><p className="text-slate-300 mb-6">{selectedService.fullDesc}</p>
                            <ul className="space-y-2">{selectedService.details.map((d, i) => (<li key={i} className="flex gap-2 text-sm text-slate-400"><CheckCircle2 className="w-4 h-4 text-amber-500" />{d}</li>))}</ul></div>
                        )}
                    </MagicModal>
                </section>
            );
        };

        const Biography = () => {
            return (
                <section id="bio" className="py-20 relative z-10 max-w-7xl mx-auto px-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
                        <div className="relative h-[400px] bg-slate-900 rounded-xl overflow-hidden border border-slate-800"><img src="images/foto-bio.png" className="w-full h-full object-cover" /></div>
                        <div className="space-y-6"><h2 className="text-xs font-bold tracking-widest text-amber-500 uppercase">Sobre Mí</h2><p className="text-slate-300 text-lg leading-relaxed">Con más de 12 años de trayectoria, Ángel Ruiz fusiona la neurociencia con la prestidigitación para crear experiencias únicas de asombro psicológico.</p></div>
                    </div>
                </section>
            );
        };

        const App = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [isContactOpen, setIsContactOpen] = useState(false);
            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);
            return (
                <div className="bg-slate-950 min-h-screen text-slate-200 cursor-none">
                    <MagicCursor />
                    <ParticleBackground />
                    <nav className={`fixed top-0 left-0 w-full z-40 flex justify-between items-center transition-all p-6 ${isScrolled ? 'bg-slate-950/80 backdrop-blur-md py-3 shadow-lg' : ''}`}>
                        <div className="font-['Cinzel'] text-amber-500 font-bold tracking-widest">ANGEL RUIZ</div>
                        <div className="hidden md:flex gap-8 text-xs uppercase tracking-widest">
                            <a href="#bio" className="hover:text-amber-400">Sobre Mí</a>
                            <a href="#services" className="hover:text-amber-400">Servicios</a>
                            <button onClick={() => setIsContactOpen(true)} className="text-amber-500 border border-amber-500/50 px-4 py-1 rounded-full cursor-pointer">Contacto</button>
                        </div>
                    </nav>
                    <main>
                        <Hero onOpenModal={() => setIsContactOpen(true)} />
                        <TrustedBrands />
                        <Biography />
                        <Services /> 
                        <section className="py-20 text-center relative z-10"><h2 className="text-4xl font-['Cinzel'] text-white mb-8">¿Listo para creer?</h2><button onClick={() => setIsContactOpen(true)} className="px-12 py-5 bg-amber-500 text-slate-950 font-bold rounded-full uppercase text-xs cursor-pointer shadow-lg">Reservar Experiencia</button></section>
                    </main>
                    <ContactFormModal isOpen={isContactOpen} onClose={() => setIsContactOpen(false)} />
                    <MagicChat />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
